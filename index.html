<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0D0D0D">
  <meta name="description" content="ALMA — Preserve your voice, values, and memories for the people you love.">
  <meta property="og:title" content="ALMA — Emotional Legacy Archive">
  <meta property="og:description" content="An open-source platform that lets you preserve your voice for the people you love — so they can talk to you even when you're no longer there.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://projeto-alma.netlify.app">
  <title>ALMA — A Voz do Pai</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕊</text></svg>">
</head>
<body>
  <main class="page-index" style="display:none" id="pageIndex">

    <!-- Title + Admin Photo -->
    <div class="alma-title">
      <div class="alma-photo-wrapper" style="position:relative;display:inline-block;margin-bottom:12px;">
        <div class="alma-admin-photo" id="photo-Alma" style="width:80px;height:80px;border-radius:50%;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;overflow:hidden;margin:0 auto;border:2px solid var(--accent);cursor:pointer;" title="Clique para trocar a foto do ALMA">
          <span class="person-initial" style="font-family:var(--font-title);font-size:1.8rem;color:var(--accent);font-weight:700;">M</span>
        </div>
        <label class="photo-upload-btn" style="position:absolute;bottom:-2px;right:calc(50% - 52px);" title="Trocar foto do ALMA">
          <input type="file" accept="image/*" id="almaPhotoInput" hidden>
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </label>
      </div>
      <h1 class="alma-logo">ALMA</h1>
      <div class="alma-divider"></div>
      <div class="alma-author" id="almaAuthor"></div>
      <p class="alma-subtitle">A voz do seu pai, guardada no tempo</p>
      <div class="alma-stats" id="almaStats"></div>
    </div>

    <!-- Person cards rendered dynamically from database -->
    <div id="personsContainer"></div>

    <!-- Footer -->
    <footer class="page-footer">
      <p>Painel do Admin — escolha um usuário para conversar como ele</p>
      <div class="nav-links">
        <a href="admin.html">Banco de Dados</a>
        <a href="revisor.html">Revisor</a>
        <a href="sobre.html">Sobre</a>
        <a href="#" id="btnLogoutIndex">Sair</a>
      </div>
    </footer>
  </main>

  <script>
    (function() {
      'use strict';

      // Admin-only page
      var token = localStorage.getItem('alma_token');
      var isAdmin = localStorage.getItem('alma_admin') === '1';
      if (!token) {
        window.location.href = 'login.html';
        return;
      }
      if (!isAdmin) {
        // Normal users go straight to chat
        window.location.href = 'chat.html';
        return;
      }
      // Auth helper
      function authHeaders() {
        var token = localStorage.getItem('alma_token') || '';
        return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
      }

      // Admin OK — show page
      document.getElementById('pageIndex').style.display = '';

      // --- Shared helpers ---
      var CAMERA_SVG = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>';

      function setPhotoPreview(name, base64) {
        var el = document.getElementById('photo-' + name);
        if (el) {
          el.style.backgroundImage = 'url(' + base64 + ')';
          el.style.backgroundSize = 'cover';
          el.style.backgroundPosition = 'center';
          var initial = el.querySelector('.person-initial');
          if (initial) initial.style.display = 'none';
        }
      }

      function uploadPhoto(inputEl) {
        inputEl.addEventListener('change', function(e) {
          var file = e.target.files[0];
          if (!file) return;
          var person = inputEl.getAttribute('data-person');
          var reader = new FileReader();
          reader.onload = function(ev) {
            var img = new Image();
            img.onload = function() {
              var canvas = document.createElement('canvas');
              var size = 150;
              canvas.width = size; canvas.height = size;
              var ctx = canvas.getContext('2d');
              var min = Math.min(img.width, img.height);
              ctx.drawImage(img, (img.width - min) / 2, (img.height - min) / 2, min, min, 0, 0, size, size);
              var base64 = canvas.toDataURL('image/jpeg', 0.7);
              setPhotoPreview(person, base64);
              fetch('/.netlify/functions/memories', {
                method: 'POST', headers: authHeaders(),
                body: JSON.stringify({ action: 'save_config', key: 'photo_' + person, value: base64 })
              });
            };
            img.src = ev.target.result;
          };
          reader.readAsDataURL(file);
        });
        inputEl.closest('.photo-upload-btn').addEventListener('click', function(e) { e.stopPropagation(); });
      }

      function createPersonCard(person) {
        var name = person.name;
        var type = person.type;
        var display = person.displayName || name;
        var desc = person.description || '';
        var card = document.createElement('div');
        card.className = 'person-card';
        card.setAttribute('data-name', name);
        card.setAttribute('data-type', type);
        card.setAttribute('role', 'button');
        card.setAttribute('tabindex', '0');
        card.innerHTML =
          '<div class="person-photo-wrapper">' +
            '<div class="person-photo" id="photo-' + name + '">' +
              '<span class="person-initial">' + display + '</span>' +
            '</div>' +
            '<label class="photo-upload-btn" title="Trocar foto">' +
              '<input type="file" accept="image/*" class="photo-input" data-person="' + name + '" hidden>' +
              CAMERA_SVG +
            '</label>' +
          '</div>' +
          '<div class="person-info">' +
            '<h3>' + display.toUpperCase() + '</h3>' +
            (desc ? '<p>' + desc + '</p>' : '') +
          '</div>';

        // Click handler
        function selectPerson() {
          sessionStorage.setItem('alma_filho', name);
          sessionStorage.setItem('alma_tipo', type);
          sessionStorage.setItem('alma_admin_view', '1');
          window.location.href = 'chat.html';
        }
        card.addEventListener('click', selectPerson);
        card.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectPerson(); }
        });

        // Photo upload
        var input = card.querySelector('.photo-input');
        if (input) uploadPhoto(input);

        // Load existing photo
        fetch('/.netlify/functions/memories?action=get_config&key=photo_' + name, { headers: authHeaders() })
          .then(function(r) { return r.json(); })
          .then(function(data) { if (data.value) setPhotoPreview(name, data.value); })
          .catch(function() {});

        return card;
      }

      // --- Load DB stats ---
      fetch('/.netlify/functions/memories?action=stats')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var el = document.getElementById('almaStats');
          if (el && data.chunks) {
            var text = '<span>' + data.chunks + ' memórias</span>';
            if (data.corrections > 0) text += ' · <span>' + data.corrections + ' correções</span>';
            el.innerHTML = text;
          }
        })
        .catch(function() {});

      // --- Load ALMA admin photo ---
      fetch('/.netlify/functions/memories?action=get_config&key=photo_alma', { headers: authHeaders() })
        .then(function(r) { return r.json(); })
        .then(function(data) { if (data.value) setPhotoPreview('Alma', data.value); })
        .catch(function() {});

      var almaPhotoInput = document.getElementById('almaPhotoInput');
      if (almaPhotoInput) {
        almaPhotoInput.setAttribute('data-person', 'alma');
        uploadPhoto(almaPhotoInput);
        document.getElementById('photo-Alma').addEventListener('click', function() { almaPhotoInput.click(); });
      }

      // --- Load persons from DB and render cards dynamically ---
      fetch('/.netlify/functions/memories?action=get_persons', { headers: authHeaders() })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          // Set author name
          var authorEl = document.getElementById('almaAuthor');
          if (authorEl && data.author) authorEl.textContent = data.author;

          var container = document.getElementById('personsContainer');
          if (!data.persons || data.persons.length === 0) {
            container.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px;">Nenhuma pessoa cadastrada. <a href="setup.html">Configure o ALMA</a>.</p>';
            return;
          }

          var filhos = data.persons.filter(function(p) { return p.type === 'filho'; });
          var outros = data.persons.filter(function(p) { return p.type !== 'filho'; });

          if (filhos.length > 0) {
            var section = document.createElement('div');
            section.innerHTML = '<div class="section-label">Filhos</div>';
            var grid = document.createElement('div');
            grid.className = 'persons-grid';
            filhos.forEach(function(p) { grid.appendChild(createPersonCard(p)); });
            section.appendChild(grid);
            container.appendChild(section);
          }

          if (outros.length > 0) {
            var section2 = document.createElement('div');
            section2.innerHTML = '<div class="section-label">Outros</div>';
            var grid2 = document.createElement('div');
            grid2.className = 'persons-grid';
            outros.forEach(function(p) { grid2.appendChild(createPersonCard(p)); });
            section2.appendChild(grid2);
            container.appendChild(section2);
          }
        })
        .catch(function() {
          document.getElementById('personsContainer').innerHTML =
            '<p style="color:var(--text-muted);text-align:center;padding:20px;">Erro ao carregar pessoas.</p>';
        });

      // --- Logout ---
      document.getElementById('btnLogoutIndex').addEventListener('click', function(e) {
        e.preventDefault();
        var token = localStorage.getItem('alma_token');
        if (token) {
          fetch('/api/auth', { method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'logout', token: token }) }).catch(function() {});
        }
        localStorage.removeItem('alma_token');
        localStorage.removeItem('alma_user');
        localStorage.removeItem('alma_type');
        localStorage.removeItem('alma_admin');
        sessionStorage.clear();
        window.location.href = 'login.html';
      });
    })();
  </script>
</body>
</html>
