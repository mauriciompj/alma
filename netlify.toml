[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Redirect API calls to functions
[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/memories"
  to = "/.netlify/functions/memories"
  status = 200

[[redirects]]
  from = "/api/auth"
  to = "/.netlify/functions/auth"
  status = 200

[[redirects]]
  from = "/api/voice"
  to = "/.netlify/functions/alma-voice"
  status = 200

[[redirects]]
  from = "/api/ingest"
  to = "/.netlify/functions/ingest"
  status = 200

[[redirects]]
  from = "/api/legacy"
  to = "/.netlify/functions/legacy"
  status = 200

[[redirects]]
  from = "/api/db-admin"
  to = "/.netlify/functions/db-admin"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://accounts.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://api.anthropic.com https://api.elevenlabs.io https://accounts.google.com https://oauth2.googleapis.com; font-src 'self'; media-src 'self' data: blob:; frame-src 'self' https://accounts.google.com; frame-ancestors 'none'"

# HTML files: always revalidate (prevents stale content after deploys)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"

# JS/CSS/Locales: no-cache to ensure fresh content after deploys
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/locales/*"
  [headers.values]
    Cache-Control = "no-cache"

# Entrar via magic link (must be BEFORE catch-all)
[[redirects]]
  from = "/entrar"
  to = "/entrar.html"
  status = 200

# Carta page (must be BEFORE catch-all)
[[redirects]]
  from = "/carta"
  to = "/carta.html"
  status = 200

# Exportar livro page (must be BEFORE catch-all)
[[redirects]]
  from = "/exportar"
  to = "/exportar.html"
  status = 200

# Árvore genealógica page (must be BEFORE catch-all)
[[redirects]]
  from = "/arvore"
  to = "/arvore.html"
  status = 200

# Timeline page (must be BEFORE catch-all)
[[redirects]]
  from = "/timeline"
  to = "/timeline.html"
  status = 200

# Catch-all: redirect unknown routes to login (must be LAST redirect)
[[redirects]]
  from = "/*"
  to = "/login.html"
  status = 302
