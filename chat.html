<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1A1A2E">
  <title>ALMA — Conversa</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕊</text></svg>">
</head>
<body>
  <div class="page-chat" style="display:none" id="pageChat">

    <!-- Header -->
    <header class="chat-header">
      <button class="btn-back" id="btnLogout" aria-label="Voltar/Sair">
        <span id="btnLogoutIcon">&#8592;</span>
      </button>
      <h1 class="chat-header-title" id="headerTitle">ALMA</h1>
      <nav class="chat-header-nav">
        <button class="btn-directives" id="btnDirectives" title="Diretrizes">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
        <a href="sobre.html">Sobre</a>
      </nav>
    </header>

    <!-- Chat Area -->
    <div class="chat-area">
      <div class="chat-messages" id="chatMessages">
        <!-- Messages rendered by JS -->
      </div>

      <!-- Suggestions -->
      <div class="suggestions" id="suggestions">
        <button class="suggestion-btn" data-text="Pai, o que você mais se arrepende na vida?">
          "Pai, o que você mais se arrepende?"
        </button>
        <button class="suggestion-btn" data-text="Como eu sei quando tô fazendo a coisa certa?">
          "Como sei se tô fazendo a coisa certa?"
        </button>
        <button class="suggestion-btn" data-text="O que você queria que eu soubesse sobre ser homem?">
          "O que você queria que eu soubesse?"
        </button>
        <button class="suggestion-btn" data-text="Você tinha medo de alguma coisa?">
          "Você tinha medo de alguma coisa?"
        </button>
        <button class="suggestion-btn" data-text="Por que você fez o ALMA?">
          "Por que você fez o ALMA?"
        </button>
      </div>
    </div>

    <!-- Input Area -->
    <div class="chat-input-area">
      <div class="chat-input-wrapper">
        <div class="chat-input-container">
          <textarea
            id="chatInput"
            class="chat-input"
            placeholder="Pergunte algo ao seu pai..."
            rows="1"
            maxlength="500"
            aria-label="Escreva sua mensagem"
          ></textarea>
          <span class="char-count" id="charCount">0/500</span>
        </div>
        <button class="btn-send" id="sendBtn" disabled aria-label="Enviar mensagem">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Directives Panel (collapsible, outside page-chat for z-index) -->
  <div class="directives-panel" id="directivesPanel">
    <div class="directives-panel-header">
      <h3>Diretrizes — <span id="directivesPersonName"></span></h3>
      <button class="directives-panel-close" id="directivesPanelClose">&times;</button>
    </div>
    <div class="directives-panel-body">
      <p class="directives-panel-desc">Diretrizes individuais de como o ALMA deve conversar com esta pessoa.</p>

      <!-- Add new directive inline -->
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <input type="text" id="chatNewDirText" class="directives-panel-textarea" style="min-height:auto;padding:8px 10px;font-size:0.82rem;flex:1;" placeholder="Nova diretriz...">
        <button class="directives-panel-save" id="chatAddDirBtn" style="white-space:nowrap;font-size:0.75rem;padding:6px 12px;">+</button>
      </div>

      <!-- Directives list -->
      <div id="chatDirectivesList" style="display:flex;flex-direction:column;gap:8px;"></div>
    </div>
  </div>
  <div class="directives-panel-overlay" id="directivesPanelOverlay"></div>

  <script>
    // Auth guard + role-based UI
    (function() {
      var token = localStorage.getItem('alma_token');
      var user = localStorage.getItem('alma_user');
      var type = localStorage.getItem('alma_type');
      var isAdmin = localStorage.getItem('alma_admin') === '1';
      var adminView = sessionStorage.getItem('alma_admin_view') === '1';

      if (!token || !user) {
        window.location.href = 'login.html';
        return;
      }

      // If admin impersonating, use the sessionStorage person. Otherwise use logged-in user.
      if (!adminView) {
        sessionStorage.setItem('alma_filho', user);
        sessionStorage.setItem('alma_tipo', type || 'outro');
      }

      // Auth OK — show page
      document.getElementById('pageChat').style.display = '';

      // --- Hide admin features for normal users ---
      if (!isAdmin) {
        // Hide directives button
        var dirBtn = document.getElementById('btnDirectives');
        if (dirBtn) dirBtn.style.display = 'none';
        // Hide "Sobre" link
        var sobreLink = document.querySelector('.chat-header-nav a[href="sobre.html"]');
        if (sobreLink) sobreLink.style.display = 'none';
        // Set flag so alma.js hides correction buttons
        window.ALMA_HIDE_CORRECTIONS = true;
      }

      // --- Back/Logout button ---
      document.getElementById('btnLogout').addEventListener('click', function() {
        if (isAdmin && adminView) {
          // Admin goes back to dashboard
          sessionStorage.removeItem('alma_admin_view');
          window.location.href = 'index.html';
        } else {
          // Normal user logs out
          localStorage.removeItem('alma_token');
          localStorage.removeItem('alma_user');
          localStorage.removeItem('alma_type');
          localStorage.removeItem('alma_admin');
          sessionStorage.clear();
          window.location.href = 'login.html';
        }
      });
    })();
  </script>
  <script src="js/alma.js"></script>
</body>
</html>
