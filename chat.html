<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1A1A2E">
  <meta name="description" content="ALMA — Preserve your voice, values, and memories for the people you love.">
  <meta property="og:title" content="ALMA — Emotional Legacy Archive">
  <meta property="og:description" content="Talk to the people you love, even when they're no longer here. Powered by their real words and memories.">
  <meta property="og:type" content="website">
  <title>ALMA — Conversa</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕊</text></svg>">
  <script src="js/i18n.js?v=3"></script>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <!-- Demo banner: only shows on demo domain -->
  <div id="demoBanner" style="display:none; background:#d4a017; color:#0D0D0D; text-align:center; padding:8px 16px; font-size:13px; font-weight:600; position:fixed; top:0; left:0; right:0; z-index:1000;">
    DEMO — Dados fictícios &nbsp;|&nbsp; <a href="https://github.com/mauriciompj/alma" style="color:#0D0D0D; text-decoration:underline;">GitHub</a>
  </div>
  <script>if(location.hostname.includes('demo')){document.getElementById('demoBanner').style.display='block';document.body.style.paddingTop='36px';}</script>

  <div class="page-chat" style="display:none" id="pageChat">

    <!-- Header -->
    <header class="chat-header">
      <button class="btn-back" id="btnLogout" aria-label="Voltar/Sair">
        <span id="btnLogoutIcon">&#8592;</span>
      </button>
      <h1 class="chat-header-title" id="headerTitle">ALMA</h1>
      <nav class="chat-header-nav">
        <button class="btn-voice-toggle" id="btnVoiceToggle" title="Voz automática" aria-label="Voz automática" aria-pressed="false">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.5 8.5a5 5 0 0 1 0 7"></path><path d="M18.5 5.5a9 9 0 0 1 0 13"></path></svg>
        </button>
        <button class="btn-directives" id="btnDirectives" title="Diretrizes">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
        <a href="carta.html">Carta</a>
        <a href="exportar.html">Livro</a>
        <a href="arvore.html">Árvore</a>
        <a href="timeline.html">Timeline</a>
        <a href="sobre.html">Sobre</a>
      </nav>
    </header>

    <!-- Chat Area -->
    <div class="chat-area">
      <div class="chat-messages" id="chatMessages">
        <!-- Messages rendered by JS -->
      </div>

      <!-- Suggestions -->
      <div class="suggestions" id="suggestions">
        <button class="suggestion-btn" data-text="Pai, o que você mais se arrepende na vida?" aria-label="Perguntar sobre arrependimentos">
          "Pai, o que você mais se arrepende?"
        </button>
        <button class="suggestion-btn" data-text="Como eu sei quando tô fazendo a coisa certa?" aria-label="Perguntar como saber se está certo">
          "Como sei se tô fazendo a coisa certa?"
        </button>
        <button class="suggestion-btn" data-text="O que você queria que eu soubesse sobre ser homem?" aria-label="Perguntar sobre ser homem">
          "O que você queria que eu soubesse?"
        </button>
        <button class="suggestion-btn" data-text="Você tinha medo de alguma coisa?" aria-label="Perguntar sobre medos">
          "Você tinha medo de alguma coisa?"
        </button>
        <button class="suggestion-btn" data-text="Por que você fez o ALMA?" aria-label="Perguntar por que criou o ALMA">
          "Por que você fez o ALMA?"
        </button>
      </div>
    </div>

    <!-- Input Area -->
    <div class="chat-input-area">
      <div class="chat-input-wrapper">
        <div class="chat-input-container">
          <textarea
            id="chatInput"
            class="chat-input"
            placeholder="Pergunte algo ao seu pai..."
            rows="1"
            maxlength="500"
            aria-label="Escreva sua mensagem"
          ></textarea>
          <span class="char-count" id="charCount">0/500</span>
        </div>
        <button class="btn-send" id="sendBtn" disabled aria-label="Enviar mensagem">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Directives Panel (collapsible, outside page-chat for z-index) -->
  <div class="directives-panel" id="directivesPanel">
    <div class="directives-panel-header">
      <h3>Diretrizes — <span id="directivesPersonName"></span></h3>
      <button class="directives-panel-close" id="directivesPanelClose">&times;</button>
    </div>
    <div class="directives-panel-body">
      <p class="directives-panel-desc">Diretrizes individuais de como o ALMA deve conversar com esta pessoa.</p>

      <!-- Add new directive inline -->
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <input type="text" id="chatNewDirText" class="directives-panel-textarea" style="min-height:auto;padding:8px 10px;font-size:0.82rem;flex:1;" placeholder="Nova diretriz...">
        <button class="directives-panel-save" id="chatAddDirBtn" style="white-space:nowrap;font-size:0.75rem;padding:6px 12px;">+</button>
      </div>

      <!-- Directives list -->
      <div id="chatDirectivesList" style="display:flex;flex-direction:column;gap:8px;"></div>
    </div>
  </div>
  <div class="directives-panel-overlay" id="directivesPanelOverlay"></div>

  <script>
    // Auth guard + role-based UI
    (function() {
      var token = localStorage.getItem('alma_token');
      var user = localStorage.getItem('alma_user');
      var type = localStorage.getItem('alma_type');
      var isAdmin = localStorage.getItem('alma_admin') === '1';
      var adminView = sessionStorage.getItem('alma_admin_view') === '1';
      var isDemo = location.hostname.includes('demo');

      if (!token || !user) {
        window.location.href = 'login.html';
        return;
      }

      // Demo mode: flag for alma.js to skip history persistence
      if (isDemo) window.ALMA_DEMO = true;

      // If admin impersonating, use the sessionStorage person. Otherwise use logged-in user.
      if (!adminView) {
        sessionStorage.setItem('alma_filho', user);
        sessionStorage.setItem('alma_tipo', type || 'outro');
      }

      // Auth OK — show page
      document.getElementById('pageChat').style.display = '';

      // --- Hide admin features for normal users ---
      if (!isAdmin) {
        // Hide directives button
        var dirBtn = document.getElementById('btnDirectives');
        if (dirBtn) dirBtn.style.display = 'none';
        // Hide "Árvore" and "Sobre" links
        var arvoreLink = document.querySelector('.chat-header-nav a[href="arvore.html"]');
        if (arvoreLink) arvoreLink.style.display = 'none';
        var sobreLink = document.querySelector('.chat-header-nav a[href="sobre.html"]');
        if (sobreLink) sobreLink.style.display = 'none';
        // Set flag so alma.js hides correction buttons
        window.ALMA_HIDE_CORRECTIONS = true;
      }

      // --- Back/Logout button ---
      document.getElementById('btnLogout').addEventListener('click', function() {
        if (isAdmin && adminView) {
          // Admin goes back to dashboard
          sessionStorage.removeItem('alma_admin_view');
          window.location.href = 'index.html';
        } else {
          // Normal user logs out — invalidate token on server
          var token = localStorage.getItem('alma_token');
          if (token) {
            fetch('/api/auth', { method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ action: 'logout', token: token }) }).catch(function() {});
          }
          localStorage.removeItem('alma_token');
          localStorage.removeItem('alma_user');
          localStorage.removeItem('alma_type');
          localStorage.removeItem('alma_admin');
          sessionStorage.clear();
          window.location.href = 'login.html';
        }
      });
    })();
  </script>
  <script>
    // Load i18n for chat page — translate static elements
    loadLocale(getCurrentLang(), function() {
      // Chat input placeholder
      var isChild = ['filho'].includes(localStorage.getItem('alma_type'));
      var input = document.getElementById('chatInput');
      if (input) input.placeholder = isChild ? t('chat.placeholderChild') : t('chat.placeholderOther', { authorName: t('labels.authorName') });
      if (input) input.setAttribute('aria-label', t('chat.placeholderChild'));

      // Suggestions are handled entirely by alma.js init() to avoid race conditions

      // Header nav
      var sobreLink = document.querySelector('.chat-header-nav a[href="sobre.html"]');
      if (sobreLink && getCurrentLang() === 'en') sobreLink.textContent = 'About';
      if (sobreLink && getCurrentLang() === 'es') sobreLink.textContent = 'Acerca';

      // Directives panel
      var dirDesc = document.querySelector('.directives-panel-desc');
      if (dirDesc && getCurrentLang() !== 'pt-BR') dirDesc.textContent = t('directives.empty');
      var dirInput = document.getElementById('chatNewDirText');
      if (dirInput) dirInput.placeholder = t('directives.addPlaceholder');

      // Store locale globally for alma.js to use
      window.ALMA_LANG = getCurrentLang();
    });
  </script>
  <script type="module" src="js/alma.js?v=3"></script>
</body>
</html>
