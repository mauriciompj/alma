<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0D0D0D">
  <meta name="description" content="ALMA — Preserve your voice, values, and memories for the people you love.">
  <meta property="og:title" content="ALMA — Emotional Legacy Archive">
  <meta property="og:description" content="An open-source platform to preserve your voice for the people you love — so they can talk to you even when you're no longer there.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://projeto-alma.netlify.app">
  <title>ALMA — Entrar</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕊</text></svg>">
  <script src="js/i18n.js"></script>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <main class="page-login">
    <!-- Demo banner: only shows on demo domain -->
    <div id="demoBanner" style="display:none; background:#d4a017; color:#0D0D0D; text-align:center; padding:10px 16px; font-size:14px; font-weight:600; position:fixed; top:0; left:0; right:0; z-index:1000;">
      DEMO — Dados fictícios. Login: Lucas / demo123 &nbsp;|&nbsp; <a href="https://github.com/mauriciompj/alma" style="color:#0D0D0D; text-decoration:underline;">Ver no GitHub</a>
    </div>
    <script>if(location.hostname.includes('demo'))document.getElementById('demoBanner').style.display='block';</script>

    <div class="login-container">

      <!-- Header -->
      <div class="alma-title">
        <h1 class="alma-logo">ALMA</h1>
        <div class="alma-divider"></div>
        <div class="alma-author" id="almaAuthor">Maurício Maciel Pereira Júnior</div>
        <p class="alma-subtitle">A voz do seu pai, guardada no tempo</p>
      </div>
      <script>if(location.hostname.includes('demo'))document.getElementById('almaAuthor').textContent='Rafael Mendes (Personagem Fictício)';</script>

      <!-- Login Form -->
      <form class="login-form" id="loginForm" autocomplete="off">
        <div class="login-field">
          <label for="loginUser">Seu nome</label>
          <input type="text" id="loginUser" name="username" placeholder="Digite seu nome" autocomplete="off" required>
        </div>
        <div class="login-field">
          <label for="loginPass">Senha</label>
          <input type="password" id="loginPass" name="password" placeholder="Digite sua senha" autocomplete="off" required>
        </div>
        <div class="login-error" id="loginError"></div>
        <button type="submit" class="login-btn" id="loginBtn">Entrar</button>
      </form>

      <div id="googleLoginSection" style="display:none;margin-top:16px;">
        <div id="googleDivider" style="display:flex;align-items:center;gap:12px;color:#8e8e8e;font-size:0.8rem;letter-spacing:0.08em;text-transform:uppercase;">
          <span style="flex:1;height:1px;background:rgba(255,255,255,0.08);"></span>
          <span id="googleDividerText">ou continue com Google</span>
          <span style="flex:1;height:1px;background:rgba(255,255,255,0.08);"></span>
        </div>
        <div id="googleButtonWrap" style="margin-top:14px;display:flex;justify-content:center;">
          <div id="googleSignInButton"></div>
        </div>
      </div>

      <p class="login-hint" id="loginHint">Cada pessoa tem seu acesso privado ao ALMA.</p>

      <!-- Language selector -->
      <div id="langSelector" style="margin-top:20px;"></div>

      <!-- Legacy link (hidden, shown only when dead man's switch activates) -->
      <div id="legacyLink" style="display:none;margin-top:30px;text-align:center;">
        <a href="legacy.html" style="color:#E8C547;font-family:Georgia,serif;font-size:0.9rem;text-decoration:none;letter-spacing:1px;">Se você tem uma frase-chave, clique aqui</a>
      </div>
    </div>
  </main>

  <script>
    // Apply i18n translations after locale loads
    loadLocale(getCurrentLang(), function() {
      document.title = t('login.pageTitle');
      document.querySelector('.alma-subtitle').textContent = t('app.subtitle');
      document.querySelector('label[for="loginUser"]').textContent = t('login.nameLabel');
      document.getElementById('loginUser').placeholder = t('login.namePlaceholder');
      document.querySelector('label[for="loginPass"]').textContent = t('login.passwordLabel');
      document.getElementById('loginPass').placeholder = t('login.passwordPlaceholder');
      document.getElementById('loginBtn').textContent = t('login.submitButton');
      document.getElementById('loginHint').textContent = t('login.hint');
      document.getElementById('googleDividerText').textContent = t('login.googleDivider');
      createLangSelector('langSelector');

      // Check if dead man's switch is activated — show legacy link
      fetch('/api/legacy', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'activation_status' })
      }).then(function(r) { return r.json(); }).then(function(d) {
        if (d.activated) document.getElementById('legacyLink').style.display = '';
      }).catch(function() {});
    });
  </script>
  <script>
    (function() {
      'use strict';

      var googleClientId = null;
      var googleButtonReady = false;

      // Demo mode: auto-login as Visitante silently, skip form
      if (location.hostname.includes('demo')) {
        fetch('/.netlify/functions/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'login', username: 'Visitante', password: 'demo123' })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.success) {
            localStorage.setItem('alma_token', data.token);
            localStorage.setItem('alma_user', data.name);
            localStorage.setItem('alma_type', data.type);
            localStorage.setItem('alma_admin', '0');
            if (data.birthDate) localStorage.setItem('alma_birthDate', data.birthDate);
            else localStorage.removeItem('alma_birthDate');
            sessionStorage.setItem('alma_filho', data.name);
            sessionStorage.setItem('alma_tipo', data.type);
            window.location.href = 'chat.html';
          } else {
            // Fallback: show login form if auto-login fails
            document.querySelector('.login-container').style.display = '';
          }
        })
        .catch(function() {
          document.querySelector('.login-container').style.display = '';
        });
        return;
      }

      // Magic link: auto-login via ?token=XXX in URL
      var urlParams = new URLSearchParams(window.location.search);
      var magicToken = urlParams.get('token');
      if (magicToken) {
        fetch('/.netlify/functions/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'magic_link', magicToken: magicToken })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.success) {
            localStorage.setItem('alma_token', data.token);
            localStorage.setItem('alma_user', data.name);
            localStorage.setItem('alma_type', data.type);
            localStorage.setItem('alma_admin', data.admin ? '1' : '0');
            if (data.birthDate) localStorage.setItem('alma_birthDate', data.birthDate);
            else localStorage.removeItem('alma_birthDate');
            sessionStorage.setItem('alma_filho', data.name);
            sessionStorage.setItem('alma_tipo', data.type);
            window.location.href = 'chat.html';
          } else {
            document.querySelector('.login-container').style.display = '';
            var errorEl = document.getElementById('loginError');
            if (errorEl) errorEl.textContent = 'Link expirado ou inválido. Faça login normalmente.';
          }
        })
        .catch(function() {
          document.querySelector('.login-container').style.display = '';
        });
        return;
      }

      // Check if already logged in
      var token = localStorage.getItem('alma_token');
      if (token) {
        verifyToken(token);
      }

      var form = document.getElementById('loginForm');
      var errorEl = document.getElementById('loginError');
      var btn = document.getElementById('loginBtn');
      var googleSection = document.getElementById('googleLoginSection');
      var googleButtonHost = document.getElementById('googleSignInButton');

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        errorEl.textContent = '';
        setPrimaryLoading(true);

        var username = document.getElementById('loginUser').value.trim();
        var password = document.getElementById('loginPass').value;

        fetch('/.netlify/functions/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'login', username: username, password: password })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.success) {
            persistSessionAndRedirect(data);
          } else {
            errorEl.textContent = data.error || t('login.errorGeneric');
            setPrimaryLoading(false);
          }
        })
        .catch(function() {
          errorEl.textContent = t('login.errorConnection');
          setPrimaryLoading(false);
        });
      });

      loadGoogleConfig();

      function verifyToken(tk) {
        fetch('/.netlify/functions/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'verify', token: tk })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.valid) {
            persistSessionAndRedirect(data);
          } else {
            // Token invalid/expired, clear and stay on login
            clearStoredSession();
          }
        })
        .catch(function() {});
      }

      function setPrimaryLoading(isLoading) {
        btn.disabled = isLoading;
        btn.textContent = isLoading ? t('login.submitting') : t('login.submitButton');
      }

      function persistSessionAndRedirect(data) {
        localStorage.setItem('alma_token', data.token);
        localStorage.setItem('alma_user', data.name);
        localStorage.setItem('alma_type', data.type);
        localStorage.setItem('alma_admin', data.admin ? '1' : '0');
        if (data.birthDate) localStorage.setItem('alma_birthDate', data.birthDate);
        else localStorage.removeItem('alma_birthDate');
        sessionStorage.setItem('alma_filho', data.name);
        sessionStorage.setItem('alma_tipo', data.type);
        window.location.href = data.admin ? 'index.html' : 'chat.html';
      }

      function clearStoredSession() {
        localStorage.removeItem('alma_token');
        localStorage.removeItem('alma_user');
        localStorage.removeItem('alma_type');
        localStorage.removeItem('alma_admin');
        localStorage.removeItem('alma_birthDate');
        sessionStorage.removeItem('alma_filho');
        sessionStorage.removeItem('alma_tipo');
      }

      function loadGoogleConfig() {
        fetch('/.netlify/functions/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'google_config' })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (!data || !data.enabled || !data.clientId) return;
          googleClientId = data.clientId;
          googleSection.style.display = '';
          loadGoogleScript();
        })
        .catch(function() {});
      }

      function loadGoogleScript() {
        if (window.google && window.google.accounts && window.google.accounts.id) {
          initGoogleButton();
          return;
        }
        if (document.getElementById('googleGsiScript')) return;

        var script = document.createElement('script');
        script.id = 'googleGsiScript';
        script.src = 'https://accounts.google.com/gsi/client';
        script.async = true;
        script.defer = true;
        script.onload = initGoogleButton;
        script.onerror = function() {
          errorEl.textContent = t('login.googleLoadError');
        };
        document.head.appendChild(script);
      }

      function initGoogleButton() {
        if (googleButtonReady || !googleClientId || !(window.google && window.google.accounts && window.google.accounts.id)) return;
        google.accounts.id.initialize({
          client_id: googleClientId,
          callback: handleGoogleCredentialResponse,
          auto_select: false,
          ux_mode: 'popup',
          cancel_on_tap_outside: true
        });
        googleButtonHost.textContent = '';
        google.accounts.id.renderButton(googleButtonHost, {
          theme: 'outline',
          size: 'large',
          shape: 'pill',
          text: 'continue_with',
          width: 320
        });
        googleButtonReady = true;
      }

      function handleGoogleCredentialResponse(response) {
        if (!response || !response.credential) {
          errorEl.textContent = t('login.googleError');
          return;
        }

        errorEl.textContent = '';
        setPrimaryLoading(true);

        fetch('/.netlify/functions/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'login_google', idToken: response.credential })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.success) {
            persistSessionAndRedirect(data);
            return;
          }
          errorEl.textContent = data.error || t('login.googleError');
          setPrimaryLoading(false);
        })
        .catch(function() {
          errorEl.textContent = t('login.errorConnection');
          setPrimaryLoading(false);
        });
      }
    })();
  </script>
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(function(){});</script>
</body>
</html>
