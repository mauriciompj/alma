<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALMA — Revisor do Banco</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .revisor { max-width: 960px; margin: 0 auto; padding: 20px; min-height: 100dvh; }
  .revisor-header { text-align: center; margin-bottom: 24px; }
  .revisor-header h1 { font-family: var(--font-title); color: var(--accent); font-size: 1.6rem; }
  .revisor-header p { color: var(--text-muted); font-size: 0.85rem; margin-top: 4px; }
  .stats-bar { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
  .stat { background: var(--surface); padding: 10px 16px; border-radius: 8px; text-align: center; min-width: 100px; }
  .stat-value { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .filters select, .filters input { background: var(--surface); color: var(--text); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px 14px; font-size: 0.85rem; font-family: inherit; }
  .filters input { flex: 1; min-width: 200px; }
  .filters select { min-width: 140px; }
  .chunk-list { display: flex; flex-direction: column; gap: 8px; }
  .chunk { background: var(--surface); border-radius: 10px; padding: 14px 16px; border-left: 3px solid var(--accent-dim); transition: border-color 0.2s; }
  .chunk:hover { border-left-color: var(--accent); }
  .chunk-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 6px; }
  .chunk-title { font-size: 0.82rem; font-weight: 600; color: var(--text); flex: 1; }
  .chunk-meta { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
  .chunk-cat { font-size: 0.68rem; padding: 2px 8px; border-radius: 4px; background: var(--accent-dim); color: var(--accent); font-weight: 600; }
  .chunk-chars { font-size: 0.68rem; color: var(--text-muted); }
  .chunk-id { font-size: 0.62rem; color: var(--text-muted); }
  .chunk-content { font-size: 0.82rem; color: var(--text-soft); line-height: 1.5; white-space: pre-wrap; word-break: break-word; max-height: 120px; overflow: hidden; transition: max-height 0.3s; cursor: pointer; }
  .chunk-content.expanded { max-height: none; }
  .chunk-actions { display: flex; gap: 8px; margin-top: 10px; }
  .chunk-actions button { padding: 5px 12px; border: none; border-radius: 6px; font-size: 0.75rem; cursor: pointer; font-family: inherit; font-weight: 600; }
  .btn-edit { background: var(--blue-dim); color: var(--blue); }
  .btn-delete { background: rgba(217,74,74,0.12); color: #D94A4A; }
  .btn-recat { background: var(--accent-dim); color: var(--accent); }
  .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 20px; align-items: center; }
  .pagination button { padding: 8px 14px; border: 1px solid rgba(255,255,255,0.1); background: var(--surface); color: var(--text); border-radius: 6px; cursor: pointer; font-size: 0.82rem; }
  .pagination button.active { background: var(--accent); color: #0D0D0D; font-weight: 700; border-color: var(--accent); }
  .pagination button:disabled { opacity: 0.3; cursor: not-allowed; }
  .pagination .page-info { color: var(--text-muted); font-size: 0.8rem; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.active { display: flex; }
  .modal { background: var(--surface); border-radius: 12px; padding: 24px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
  .modal h3 { color: var(--accent); margin-bottom: 16px; font-size: 1rem; }
  .modal label { display: block; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; margin-bottom: 4px; margin-top: 12px; }
  .modal input, .modal textarea, .modal select { width: 100%; padding: 10px; background: var(--bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: var(--text); font-size: 0.85rem; font-family: inherit; }
  .modal textarea { min-height: 200px; resize: vertical; line-height: 1.5; }
  .modal-btns { display: flex; gap: 10px; margin-top: 16px; justify-content: flex-end; }
  .modal-btns button { padding: 10px 20px; border: none; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; font-family: inherit; }
  .back-link { color: var(--text-muted); text-decoration: none; font-size: 0.85rem; }
  .back-link:hover { color: var(--accent); }
  .source-tag { font-size: 0.62rem; color: var(--text-muted); background: rgba(255,255,255,0.05); padding: 1px 6px; border-radius: 3px; }
</style>
</head>
<body>
<div class="revisor">
  <div class="revisor-header">
    <a href="index.html" class="back-link">&larr; Voltar</a>
    <h1>Revisor do Banco</h1>
    <p>Navegue, filtre, edite e limpe as memórias do ALMA</p>
  </div>

  <div class="stats-bar" id="statsBar"></div>

  <div class="filters">
    <input type="text" id="searchInput" placeholder="Buscar no conteúdo...">
    <select id="catFilter"><option value="">Todas as categorias</option></select>
    <select id="sourceFilter">
      <option value="">Todas origens</option>
      <option value="doc">Documentos escritos</option>
      <option value="instagram">Instagram</option>
      <option value="whatsapp">WhatsApp</option>
    </select>
    <select id="sortBy">
      <option value="id_desc">Mais recentes</option>
      <option value="id_asc">Mais antigos</option>
      <option value="chars_desc">Maiores</option>
      <option value="chars_asc">Menores</option>
    </select>
  </div>

  <div class="chunk-list" id="chunkList"></div>
  <div class="pagination" id="pagination"></div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3 id="modalTitle">Editar chunk</h3>
    <label>Título</label>
    <input type="text" id="editTitle">
    <label>Categoria</label>
    <select id="editCategory"></select>
    <label>Conteúdo</label>
    <textarea id="editContent"></textarea>
    <label>Tags (separadas por vírgula)</label>
    <input type="text" id="editTags">
    <div class="modal-btns">
      <button style="background:var(--bg);color:var(--text-muted);" id="btnCancel">Cancelar</button>
      <button style="background:#D94A4A;color:white;" id="modalDeleteBtn">Excluir</button>
      <button style="background:var(--accent);color:#0D0D0D;" id="btnSave">Salvar</button>
    </div>
  </div>
</div>

<script src="js/i18n.js"></script>
<script>
(function() {
  'use strict';

  function escapeHtml(str) {
    var d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // i18n helper with fallback
  function rt(key, fallback) {
    if (typeof t === 'function') {
      var val = t(key);
      return (val && !val.startsWith('revisor.')) ? val : fallback;
    }
    return fallback;
  }

  var token = localStorage.getItem('alma_token');
  var isAdmin = localStorage.getItem('alma_admin') === '1';
  if (!token || !isAdmin) { window.location.href = 'login.html'; return; }

  var API = '/.netlify/functions/memories';
  var currentPage = 1;
  var perPage = 20;
  var editingId = null;
  var allCategories = [];
  var currentRenderedChunks = [];

  function authHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
  }

  // Load stats
  fetch(API + '?action=stats').then(function(r) { return r.json(); }).then(function(data) {
    var bar = document.getElementById('statsBar');
    bar.textContent = '';
    [
      { value: data.chunks, label: 'Memórias' },
      { value: Math.round(data.totalCharacters / 1000) + 'k', label: 'Caracteres' },
      { value: data.corrections, label: 'Correções' },
      { value: data.categories.length, label: 'Categorias' }
    ].forEach(function(item) {
      var stat = document.createElement('div');
      stat.className = 'stat';
      var valueEl = document.createElement('div');
      valueEl.className = 'stat-value';
      valueEl.textContent = item.value;
      var labelEl = document.createElement('div');
      labelEl.className = 'stat-label';
      labelEl.textContent = item.label;
      stat.appendChild(valueEl);
      stat.appendChild(labelEl);
      bar.appendChild(stat);
    });

    // Populate category filters
    allCategories = data.categories.map(function(c) { return c.name; });
    var sel = document.getElementById('catFilter');
    var editSel = document.getElementById('editCategory');
    data.categories.forEach(function(c) {
      var option = document.createElement('option');
      option.value = c.name;
      option.textContent = c.name + ' (' + parseInt(c.chunks) + ')';
      sel.appendChild(option);

      var editOption = document.createElement('option');
      editOption.value = c.name;
      editOption.textContent = c.name;
      editSel.appendChild(editOption);
    });

    loadChunks();
  });

  function loadChunks() {
    var q = document.getElementById('searchInput').value.trim();
    var cat = document.getElementById('catFilter').value;
    var source = document.getElementById('sourceFilter').value;
    var sort = document.getElementById('sortBy').value;

    var url = API + '?action=admin_chunks&page=' + currentPage + '&per_page=' + perPage;
    if (q) url += '&q=' + encodeURIComponent(q);
    if (cat) url += '&category=' + encodeURIComponent(cat);

    document.getElementById('chunkList').innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:40px;">' + rt('revisor.loading', 'Carregando...') + '</div>';

    fetch(url, { headers: authHeaders() }).then(function(r) { return r.json(); }).then(function(data) {
      var chunks = data.chunks || [];

      // Client-side source filter
      if (source) {
        chunks = chunks.filter(function(c) {
          var sf = (c.source_file || '').toLowerCase();
          if (source === 'instagram') return sf.indexOf('instagram') >= 0;
          if (source === 'whatsapp') return sf.indexOf('whatsapp') >= 0;
          if (source === 'doc') return sf.indexOf('instagram') < 0 && sf.indexOf('whatsapp') < 0;
          return true;
        });
      }

      // Client-side sort
      if (sort === 'chars_desc') chunks.sort(function(a,b) { return (b.char_count||0) - (a.char_count||0); });
      else if (sort === 'chars_asc') chunks.sort(function(a,b) { return (a.char_count||0) - (b.char_count||0); });
      else if (sort === 'id_asc') chunks.sort(function(a,b) { return a.id - b.id; });

      renderChunks(chunks);
      renderPagination(data.total || 0, data.totalPages || 1);
    }).catch(function() {
      document.getElementById('chunkList').innerHTML = '<div style="text-align:center;color:#D94A4A;padding:40px;">' + rt('revisor.error', 'Erro ao carregar') + '</div>';
    });
  }

  function renderChunks(chunks) {
    var el = document.getElementById('chunkList');
    currentRenderedChunks = chunks.slice();
    if (chunks.length === 0) {
      el.textContent = '';
      var empty = document.createElement('div');
      empty.style.textAlign = 'center';
      empty.style.color = 'var(--text-muted)';
      empty.style.padding = '40px';
      empty.textContent = rt('revisor.empty', 'Nenhum chunk encontrado');
      el.appendChild(empty);
      return;
    }

    el.textContent = '';
    chunks.forEach(function(c) {
      var sf = (c.source_file || '');
      var origin = sf.indexOf('instagram') >= 0 ? 'IG' : (sf.indexOf('whatsapp') >= 0 ? 'WA' : 'DOC');
      var safeId = parseInt(c.id);

      var chunkEl = document.createElement('div');
      chunkEl.className = 'chunk';
      chunkEl.dataset.id = String(safeId);

      var top = document.createElement('div');
      top.className = 'chunk-top';

      var title = document.createElement('div');
      title.className = 'chunk-title';
      title.textContent = c.title || '(sem título)';

      var meta = document.createElement('div');
      meta.className = 'chunk-meta';

      var sourceTag = document.createElement('span');
      sourceTag.className = 'source-tag';
      sourceTag.textContent = origin;

      var category = document.createElement('span');
      category.className = 'chunk-cat';
      category.textContent = c.category || '';

      var chars = document.createElement('span');
      chars.className = 'chunk-chars';
      chars.textContent = (parseInt(c.char_count) || (c.content || '').length) + 'c';

      var id = document.createElement('span');
      id.className = 'chunk-id';
      id.textContent = '#' + safeId;

      meta.appendChild(sourceTag);
      meta.appendChild(category);
      meta.appendChild(chars);
      meta.appendChild(id);
      top.appendChild(title);
      top.appendChild(meta);

      var content = document.createElement('div');
      content.className = 'chunk-content';
      content.textContent = c.content || '';
      content.addEventListener('click', function() {
        content.classList.toggle('expanded');
      });

      var actions = document.createElement('div');
      actions.className = 'chunk-actions';

      var editBtn = document.createElement('button');
      editBtn.className = 'btn-edit';
      editBtn.type = 'button';
      editBtn.textContent = rt('revisor.edit', 'Editar');
      editBtn.addEventListener('click', function() {
        openEdit(safeId);
      });

      var deleteBtn = document.createElement('button');
      deleteBtn.className = 'btn-delete';
      deleteBtn.type = 'button';
      deleteBtn.textContent = rt('revisor.delete', 'Excluir');
      deleteBtn.addEventListener('click', function() {
        quickDelete(safeId);
      });

      actions.appendChild(editBtn);
      actions.appendChild(deleteBtn);
      chunkEl.appendChild(top);
      chunkEl.appendChild(content);
      chunkEl.appendChild(actions);
      el.appendChild(chunkEl);
    });
  }

  function renderPagination(total, totalPages) {
    var el = document.getElementById('pagination');
    el.textContent = '';
    if (totalPages <= 1) { return; }

    function addPageButton(label, page, disabled, active) {
      var button = document.createElement('button');
      button.type = 'button';
      button.textContent = label;
      if (disabled) button.disabled = true;
      if (active) button.className = 'active';
      if (!disabled) {
        button.addEventListener('click', function() {
          goPage(page);
        });
      }
      el.appendChild(button);
    }

    addPageButton('«', currentPage - 1, currentPage <= 1, false);
    for (var i = 1; i <= totalPages; i++) {
      if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
        addPageButton(String(parseInt(i)), i, false, i === currentPage);
      } else if (i === currentPage - 3 || i === currentPage + 3) {
        var dots = document.createElement('span');
        dots.className = 'page-info';
        dots.textContent = '...';
        el.appendChild(dots);
      }
    }
    addPageButton('»', currentPage + 1, currentPage >= totalPages, false);

    var info = document.createElement('span');
    info.className = 'page-info';
    info.textContent = parseInt(total) + ' chunks';
    el.appendChild(info);
  }

  function goPage(p) { currentPage = p; loadChunks(); window.scrollTo(0,0); }

  // Filters
  var searchTimeout;
  var searchInput = document.getElementById('searchInput');
  searchInput.addEventListener('input', function() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(function() { currentPage = 1; loadChunks(); }, 300);
  });
  searchInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { clearTimeout(searchTimeout); currentPage = 1; loadChunks(); }
  });
  document.getElementById('catFilter').addEventListener('change', function() { currentPage = 1; loadChunks(); });
  document.getElementById('sourceFilter').addEventListener('change', function() { currentPage = 1; loadChunks(); });
  document.getElementById('sortBy').addEventListener('change', function() { loadChunks(); });

  // Edit modal
  window.openEdit = function(id) {
    editingId = parseInt(id);
    document.getElementById('modalTitle').textContent = 'Editar chunk #' + editingId;
    var chunk = currentRenderedChunks.find(function(item) { return parseInt(item.id) === editingId; });
    if (chunk) {
      document.getElementById('editTitle').value = chunk.title || '';
      document.getElementById('editCategory').value = chunk.category || '';
      document.getElementById('editContent').value = chunk.content || '';
      document.getElementById('editTags').value = (chunk.tags || []).join(', ');
    }
    document.getElementById('editModal').classList.add('active');
  };

  window.closeModal = function() {
    document.getElementById('editModal').classList.remove('active');
    editingId = null;
  };

  window.saveChunk = function() {
    if (!editingId) return;
    var body = {
      action: 'update_chunk',
      id: editingId,
      title: document.getElementById('editTitle').value,
      category: document.getElementById('editCategory').value,
      content: document.getElementById('editContent').value,
    };
    var tags = document.getElementById('editTags').value.trim();
    if (tags) body.tags = tags.split(',').map(function(t) { return t.trim(); });

    fetch(API, { method: 'POST', headers: authHeaders(), body: JSON.stringify(body) })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.success) { closeModal(); loadChunks(); }
        else alert('Erro: ' + (data.error || ''));
      });
  };

  window.deleteChunk = function() {
    if (!editingId || !confirm('Excluir chunk #' + editingId + '? Isso não pode ser desfeito.')) return;
    fetch(API, { method: 'POST', headers: authHeaders(), body: JSON.stringify({ action: 'delete_chunk', id: editingId }) })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.success) { closeModal(); loadChunks(); }
        else alert('Erro: ' + (data.error || ''));
      });
  };

  window.quickDelete = function(id) {
    id = parseInt(id);
    if (!confirm('Excluir chunk #' + id + '?')) return;
    fetch(API, { method: 'POST', headers: authHeaders(), body: JSON.stringify({ action: 'delete_chunk', id: id }) })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.success) {
          var el = document.querySelector('.chunk[data-id="' + id + '"]');
          if (el) el.remove();
        }
      });
  };

  document.getElementById('editModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.getElementById('btnCancel').addEventListener('click', closeModal);
  document.getElementById('modalDeleteBtn').addEventListener('click', deleteChunk);
  document.getElementById('btnSave').addEventListener('click', saveChunk);
})();
</script>
</body>
</html>
